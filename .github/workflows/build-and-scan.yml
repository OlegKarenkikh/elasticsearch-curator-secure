name: Build & CVE Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Ежедневная проверка на новые CVE в 03:00 UTC
    - cron: '0 3 * * *'

env:
  IMAGE_NAME: elasticsearch-curator-secure

jobs:
  build-and-scan:
    name: Build → Trivy Scan → Report
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # для загрузки SARIF в GitHub Security
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Сканирование 1: Вывод в таблицу (для PR-комментария) ──────────────
      - name: Trivy — Table output
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          trivyignores: .trivyignore
        continue-on-error: true   # не блокируем, чтобы получить SARIF тоже

      # ── Сканирование 2: SARIF → GitHub Security tab ───────────────────────
      - name: Trivy — SARIF output
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH,MEDIUM
          ignore-unfixed: true
          trivyignores: .trivyignore

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

      # ── Сканирование 3: JSON-артефакт для истории ─────────────────────────
      - name: Trivy — JSON artifact
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: json
          output: trivy-results.json
          severity: CRITICAL,HIGH,MEDIUM,LOW
          trivyignores: .trivyignore

      - name: Upload JSON artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report-${{ github.sha }}
          path: trivy-results.json
          retention-days: 30

      # ── Финальная проверка: блокировать merge при CRITICAL/HIGH ───────────
      - name: Trivy — Gate (fail on CRITICAL/HIGH)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          trivyignores: .trivyignore
          exit-code: '1'   # ← блокирует merge
