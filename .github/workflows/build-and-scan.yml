name: Build & CVE Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 3 * * *'

env:
  DOCKERHUB_IMAGE: olegkarenkikh/elasticsearch-curator-secure

jobs:

  # ===========================================================
  # Job 1: Build, Smoke-test, Trivy scan, gate
  # ===========================================================
  build-and-scan:
    name: Build -> Smoke Test -> Trivy Scan -> Gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (local)
        uses: docker/build-push-action@v5
        with:
          context: .
          tags: ${{ env.DOCKERHUB_IMAGE }}:${{ github.sha }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ---------------------------------------------------------
      # Smoke-test: проверяем что контейнер запускается,
      # бинарь curator вызывается и выводит help-текст.
      # Chainguard-образ не имеет shell, поэтому curator вызывается
      # через exec-форму (без sh -c). Ожидаем код выхода 0 — curator
      # возвращает 0 при --help.
      # ---------------------------------------------------------
      - name: Smoke test — curator binary is callable
        run: |
          echo "=== Running smoke test ==="
          OUTPUT=$(docker run --rm \
            ${{ env.DOCKERHUB_IMAGE }}:${{ github.sha }} \
            --help 2>&1) || true
          echo "--- curator output ---"
          echo "$OUTPUT"
          echo "--- end output ---"
          if echo "$OUTPUT" | grep -qi "curator"; then
            echo "✅ Smoke test PASSED: curator binary is reachable and responds"
          else
            echo "❌ Smoke test FAILED: expected 'curator' in output"
            exit 1
          fi

      - name: Trivy - Table (PR log)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKERHUB_IMAGE }}:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          trivyignores: .trivyignore
        continue-on-error: true

      - name: Trivy - SARIF
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKERHUB_IMAGE }}:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH,MEDIUM
          ignore-unfixed: true
          trivyignores: .trivyignore

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

      - name: Trivy - JSON artifact
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKERHUB_IMAGE }}:${{ github.sha }}
          format: json
          output: trivy-results.json
          severity: CRITICAL,HIGH,MEDIUM,LOW
          trivyignores: .trivyignore

      - name: Upload JSON artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report-${{ github.sha }}
          path: trivy-results.json
          retention-days: 30

      - name: Trivy - Gate (fail on CRITICAL/HIGH)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKERHUB_IMAGE }}:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          trivyignores: .trivyignore
          exit-code: '1'

  # ===========================================================
  # Job 2: Push to Docker Hub
  #   - runs only after gate passes
  #   - only on merge to main or daily schedule (never on PR)
  #   - requires secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN
  # ===========================================================
  push-to-dockerhub:
    name: Push -> Docker Hub
    runs-on: ubuntu-latest
    needs: build-and-scan
    if: |
      github.event_name != 'pull_request' &&
      (github.ref == 'refs/heads/main' || github.event_name == 'schedule')
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate image tags
        id: tags
        run: |
          SHORT_SHA="${GITHUB_SHA::8}"
          DATE="$(date -u +%Y-%m-%d)"
          TAGS="${{ env.DOCKERHUB_IMAGE }}:latest"
          TAGS="${TAGS},${{ env.DOCKERHUB_IMAGE }}:${SHORT_SHA}"
          TAGS="${TAGS},${{ env.DOCKERHUB_IMAGE }}:${DATE}"
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push to Docker Hub
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.title=elasticsearch-curator-secure
            org.opencontainers.image.source=https://github.com/OlegKarenkikh/elasticsearch-curator-secure
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.tags.outputs.short_sha }}

      - name: Print digest
        run: |
          echo "Image : ${{ env.DOCKERHUB_IMAGE }}"
          echo "Tags  : ${{ steps.tags.outputs.tags }}"
          echo "Digest: ${{ steps.build.outputs.digest }}"
